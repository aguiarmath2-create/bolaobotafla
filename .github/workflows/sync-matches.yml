name: Sync Match Results

on:
  # Runs every 2 min during World Cup match windows.
  # Matches run from ~13:00 UTC (9am ET) to ~02:00 UTC (10pm ET).
  # Janela UTC 13-23 cobre 13:00-23:59; janela UTC 0-3 cobre 00:00-03:59.
  schedule:
    - cron: '*/5 13-23 * * *'
    - cron: '*/5 0-3 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync match results
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/sync-matches.js
